<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Live Trading Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>Trading Panel</h2>

    <input id="apiToken" placeholder="Enter API Token">
    <button onclick="connect()">Connect</button>

    <div class="status" id="status">Disconnected</div>

    <hr>

    <h3>Account</h3>
    <p>Balance: <span id="balance">0</span> USD</p>

    <h3>Live Tick</h3>
    <p id="tick">--</p>
  </div>

  <!-- MAIN -->
  <div class="main">

    <h1>Live Market Dashboard</h1>

    <div class="card">
      <h3>Quick Trade</h3>

      <label>Amount</label>
      <input id="amount" type="number" value="10">

      <label>Symbol</label>
      <select id="symbol">
        <option>R_100</option>
        <option>R_50</option>
        <option>R_25</option>
      </select>

      <button class="buy" onclick="buy()">BUY CALL</button>
      <button class="sell" onclick="sell()">BUY PUT</button>
    </div>

    <div class="card">
      <h3>Logs</h3>
      <div id="log"></div>
    </div>

  </div>

</div>

<script src="app.js"></script>
</body>
</html>
