<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tradesparksite.pro</title>

  <link rel="stylesheet" href="style.css" />
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>

  <!-- LOGIN PAGE -->
  <div class="auth-container" id="authPage">

    <div class="auth-box">

      <h1>Tradesparksite.pro</h1>

      <div class="tabs">
        <button onclick="showLogin()">Login</button>
        <button onclick="showSignup()">Sign Up</button>
      </div>

      <div id="loginForm">
        <input type="email" placeholder="Email" />
        <input type="password" placeholder="Password" />
        <button onclick="openDashboard()">Login</button>
      </div>

      <div id="signupForm" style="display:none;">
        <input type="text" placeholder="Full Name" />
        <input type="email" placeholder="Email" />
        <input type="password" placeholder="Password" />
        <button onclick="openDashboard()">Create Account</button>
      </div>

    </div>

  </div>

  <!-- DASHBOARD -->
  <div class="dashboard-page" id="dashboardPage">

    <!-- TOP NAVBAR -->
    <header class="topbar">

      <div class="logo">
        Tradesparksite.Pro
      </div>

      <nav class="top-menu">

        <button>🏠Dashboard</button>
        <button>🤖Free Bots</button>
        <button>📉Strategies</button>
        <button>📑Analysis</button>
        <button>🪙D-Trader</button>
        <button>📶Signals</button>
        <button>📊Chats</button>
        <button>💾Copy Trading</button>
        <button>🛜forex</button>

      </nav>

      <div class="profile-area">

        <div class="balance-box">
          Balance: <span id="balance">$0.00</span>
        </div>

        <div class="profile-box">
          <img
            src="https://i.pravatar.cc/40"
            alt="profile"
          />

          <div>
            <h4>Trader Profile</h4>
            <small>Premium Trader</small>
          </div>
        </div>

      </div>

    </header>


    <!-- MAIN DASHBOARD -->
    <div class="dashboard-layout">

      <!-- LEFT SIDEBAR -->
      <aside class="sidebar">

        <h3>Markets</h3>

        <button>Volatility 75</button>
        <button>Volatility 100</button>
        <button>Boom 500</button>
        <button>Crash 1000</button>
        <button>EUR/USD</button>

      </aside>


      <!-- CENTER -->
      <main class="main-panel">

        <!-- CHART -->
        <section class="chart-section">

          <div id="chart-container"></div>

        </section>


        <!-- D-TRADER -->
        <section class="trade-panel">

          <div class="trade-inputs">

            <input
              type="number"
              placeholder="Stake Amount"
              id="stake"
            />

            <select>
              <option>1 Tick</option>
              <option>5 Ticks</option>
              <option>1 Minute</option>
            </select>

          </div>


          <div class="trade-buttons">

            <button class="buy-btn">
              BUY UP
            </button>

            <button class="sell-btn">
              BUY DOWN
            </button>

          </div>

        </section>

      </main>


      <!-- RIGHT PANEL -->
      <aside class="right-panel">

        <div class="card">
          <h3>Signals</h3>
          <p>BUY V75</p>
          <p>SELL Boom 500</p>
        </div>


        <div class="card">
          <h3>Copy Trading</h3>
          <p>Top Trader ROI: +34%</p>
          <button>Copy Trader</button>
        </div>


        <div class="card">
          <h3>Chats</h3>
          <p>Global trading room active...</p>
        </div>

      </aside>

    </div>

  </div>


  <script src="app.js"></script>
</body>
</html>
